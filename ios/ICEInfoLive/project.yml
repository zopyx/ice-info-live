name: ICEInfoLive
options:
  bundleIdPrefix: com.nruge.iceinfo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  ICEInfoLive:
    type: application
    platform: iOS
    sources:
      - path: ICEInfoLive
        excludes:
          - Info.plist
      - path: ICEInfoLive/Resources/Assets.xcassets
      - path: ICEInfoLive/Resources/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nruge.iceinfo
        INFOPLIST_FILE: ICEInfoLive/Info.plist
        SWIFT_VERSION: "6.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
      configs:
        debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    entitlements:
      path: ICEInfoLive/ICEInfoLive.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.nruge.iceinfo
    info:
      path: ICEInfoLive/Info.plist
      properties:
        CFBundleDisplayName: ICE Info Live
        CFBundleShortVersionString: "4.0.2"
        CFBundleVersion: "1"
        UILaunchScreen:
          UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            iceportal.de:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
